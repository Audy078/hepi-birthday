<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Happy 19th Birthday, Love</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <button class="music-toggle-btn" id="musicToggleBtn" aria-label="Toggle Music">
    <svg class="music-icon" viewBox="0 0 24 24" width="24" height="24">
      <path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
  </button>

  <div class="volume-control-wrap">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" aria-label="Volume">
  </div>

  <audio id="bgMusic" loop>
    <source src="musik.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="app" id="app">

    <div class="page page-welcome active" id="pageWelcome">
      <div class="welcome-image">
        <img class="welcome-img welcome-img-1" src="gambar/1.png" alt="party boy" />
      </div>
      <h1>HAPPY 19TH BIRTHDAY</h1>
      <div class="welcome-image">
        <img class="welcome-img welcome-img-2" src="gambar/2.png" alt="celebration" />
      </div>
      <p class="welcome-note">You have a surprise waiting for you!!</p>
    </div>

    <div class="page page-wish" id="pageWish">
      <h2>MAKE A WISH </h2>
      <form class="wish-form is-visible" id="wishForm">
        <input class="wish-input" id="wishInput" type="text" placeholder="Tulis keinginan kamu di sini yak..." autocomplete="off" />
        <button class="wish-submit" type="submit">OK</button>
      </form>
    </div>

    <div class="page page-gif" id="pageGif">
      <div class="gif-stage">
        <div class="cake-wrap" id="cakeWrap">
          <img class="gif-image cake-image" src="gambar/gif.gif" alt="birthday cake" />
          <span class="flame-cover flame-cover-1"></span>
          <span class="flame-cover flame-cover-2"></span>
          <span class="flame-cover flame-cover-3"></span>
          <span class="flame-cover flame-cover-4"></span>
        </div>
      </div>
      
      <div class="instruction-space" id="wishInstructionCard">
        <div class="wish-instruction-btn">tap on the cake</div>
      </div>
    </div>

    <div class="page page-menu" id="pageMenu">
      <h2>WHAT'S INSIDE?</h2>
      <div class="gift-menu">
        <div class="gift-card" data-gift="photo">
          <img class="gift-emoji-img" src="gambar/3.png" alt="photo gift" />
          <p>PHOTO</p>
        </div>
        <div class="gift-card" data-gift="message">
          <img class="gift-emoji-img" src="gambar/4.png" alt="photo gift" />
          <p>MESSAGE</p>
        </div>
      </div>
    </div>

    <div class="page page-photo" id="pagePhoto">
      <h2>OUR MEMORIES</h2>
      
      <div class="photo-grid">
        <div class="polaroid-grid landscape-full">
          <img class="photo-landscape" src="gambar/5.png" alt="memory" />
        </div>

        <div class="square-row">
          <div class="polaroid-grid square-item">
            <img class="photo-square" src="gambar/6.jpeg" alt="memory" />
          </div>
          <div class="polaroid-grid square-item">
            <img class="photo-square" src="gambar/7.png" alt="memory" />
          </div>
        </div>
      </div>

      <p class="photo-subtitle">"I'm so lucky to have you."</p>

      <div class="back-row">
        <button class="back-btn" id="backToMenuFromPhoto">BACK</button>
      </div>
    </div>

    <div class="page page-message" id="pageMessage">
      <div class="custom-letter-box">
        <img class="letter-bg-img" src="gambar/8.png" alt="Letter Background" />
        
        <div class="typewriter" id="typewriterBox">
          <p id="typedMessage"></p>
        </div>
      </div>

      <div class="back-row">
        <button class="back-btn back-btn-letter" id="backToMenuFromMsg">BACK TO MENU</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
